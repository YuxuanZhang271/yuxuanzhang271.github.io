<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
        <title>Yuxuan Zhang's Homepage</title>

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
        <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    </head>

    <body>
        <header>
            <ul>
                <li id="homepage"><a href="#home">Yuxuan Zhang's Homepage</a></li>
                <li><a href="#publications">Publications</a></li>
                <li><a href="#education">Education</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#cv">CV</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </header>

        <aside>
            <img src="images/profile_photo.png" alt="Profile Picture">
            <div style="margin-bottom: 40px;"></div>
            <h1>Yuxuan Zhang</h1>
            <div>Master Student @ NUS</div>
            <div>Singapore</div>
            <div>he/him</div>
            <div id="links">
                <a href="mailto:e1216649@u.nus.edu">Email</a>
                <a href="https://github.com/yuxuanzhang271">GitHub</a>
                <a href="https://linkedin.com/in/yuxuanzhang271">LinkedIn</a>
            </div>
        </aside>

        <main>
            <section id="content"></section>
        </main>

        <footer>
            Yuxuan Zhang's Homepage
        </footer>

        <script>
            function updateFooter(pageName) {
                const footer = document.querySelector('footer');
                if (pageName === 'home') {
                    footer.textContent = "Yuxuan Zhang's Homepage";
                } else {
                    const displayName = pageName.charAt(0).toUpperCase() + pageName.slice(1);
                    footer.textContent = `Yuxuan Zhang's Homepage > ${displayName}`;
                }
            }

            function initWuhanMap() {
                var map = L.map("map").setView([30.5928, 114.3055], 5);

                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    maxZoom: 19,
                    attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
                }).addTo(map);

                var wuhan = L.marker([30.5928, 114.3055]).addTo(map);
                var harbin = L.marker([45.800, 126.633]).addTo(map);
            }

            function loadContentFromHash() {
                const defaultPage = 'home';
                const hash = window.location.hash.slice(1);
                const name = hash || defaultPage;

                fetch(`${name}.html`)
                    .then(r => r.text())
                    .then(html => {
                        document.getElementById('content').innerHTML = html;

                        const $grid = $('.grid').imagesLoaded(function () {
                            $grid.masonry({
                                itemSelector: '.grid-item',
                                percentPosition: true,
                                columnWidth: '.grid-sizer',
                                gutter: 3,
                            });
                        });

                        if (name === 'about') {
                            initWuhanMap();
                        }
                    })
                    .catch(() => {
                        document.getElementById('content').innerHTML = '<p>Content not found.</p>';
                    });

                updateFooter(name);
            }

            loadContentFromHash();
            window.addEventListener('hashchange', loadContentFromHash);
        </script>
    </body>
</html>
