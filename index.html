<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
        <title>Yuxuan Zhang's Homepage</title>

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
        <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    </head>

    <body>
        <header>
            <ul>
                <li id="homepage"><a href="#home">Yuxuan Zhang's Homepage</a></li>
                <li><a href="#publications">Publications</a></li>
                <li><a href="#education">Education</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#cv">CV</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </header>

        <aside>
            <img src="images/profile_photo.webp" alt="Profile Picture">
            <div style="margin-bottom: 40px;"></div>
            <h1>Yuxuan Zhang</h1>
            <div>Master Student @ NUS</div>
            <div>Singapore</div>
            <div>he/him</div>
            <div id="links">
                <a href="mailto:e1216649@u.nus.edu">Email</a>
                <a href="https://github.com/yuxuanzhang271">GitHub</a>
                <a href="https://linkedin.com/in/yuxuanzhang271">LinkedIn</a>
            </div>
        </aside>

        <main>
            <section id="content"></section>
        </main>

        <footer>
            Yuxuan Zhang's Homepage
        </footer>

        <script>
            function updateFooter(pageName) {
                const footer = document.querySelector('footer');
                if (pageName === 'home') {
                    footer.textContent = "Yuxuan Zhang's Homepage";
                } else {
                    const displayName = pageName.charAt(0).toUpperCase() + pageName.slice(1);
                    footer.textContent = `Yuxuan Zhang's Homepage > ${displayName}`;
                }
            }

            function initWuhanMap() {
                var map = L.map("map").setView([30.5928, 114.3055], 3);

                L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    minZoom:3, maxZoom: 3
                }).addTo(map);

                var cities = [
                    [[30.5928, 114.3055], 'Hubei, China'], 
                    [[28.2282, 112.9388], 'Hunan, China'], 
                    [[29.5630, 106.5516], 'Chongqing, China'], 
                    [[30.5728, 104.0668], 'Sichuan, China'], 
                    [[39.9042, 116.4074], 'Beijing, China'], 
                    [[45.8000, 126.6330], 'Heilongjiang, China'], 
                    [[43.8171, 125.3235], 'Jilin, China'], 
                    [[36.6512, 117.1201], 'Shandong, China'], 
                    [[31.2304, 121.4737], 'Shanghai, China'], 
                    [[29.6520, 91.1721], 'Tibet, China'], 
                    [[22.8170, 108.3669], 'Guangxi, China'], 
                    [[23.1291, 113.2644], 'Guangdong, China'], 
                    [[26.6470, 106.6302], 'Guizhou, China'], 
                    [[20.0440, 110.1999], 'Hainan, China'], 
                    [[26.0745, 119.2965], 'Fujian, China'], 
                    [[36.6171, 101.7782], 'Qinghai, China'], 
                    [[36.0611, 103.8343], 'Gansu, China'], 
                    [[31.8206, 117.2272], 'Anhui, China'], 
                    [[34.7466, 113.6254], 'Henan, China'], 
                    [[34.3416, 108.9398], 'Shaanxi, China'], 
                    [[24.8790, 102.8332], 'Yunnan, China'], 

                    [[1.3521, 103.8198], 'Singapore'], 
                    [[3.1390, 101.6869], 'Kuala Lumpur, Malaysia'], 
                ];

                for (var i = 0; i < cities.length; i++) {
                    var coords = cities[i][0];
                    var label  = cities[i][1];

                    var marker = L.marker(coords).addTo(map);
                    marker.bindPopup(label);
                }
            }

            function loadContentFromHash() {
                const defaultPage = 'home';
                const hash = window.location.hash.slice(1);
                const name = hash || defaultPage;

                fetch(`${name}.html`)
                    .then(r => r.text())
                    .then(html => {
                        document.getElementById('content').innerHTML = html;

                        const $grid = $('.grid').imagesLoaded(function () {
                            $grid.masonry({
                                itemSelector: '.grid-item',
                                percentPosition: true,
                                columnWidth: '.grid-sizer',
                                gutter: 3,
                            });
                        });

                        if (name === 'about') {
                            initWuhanMap();
                        }
                    })
                    .catch(() => {
                        document.getElementById('content').innerHTML = '<p>Content not found.</p>';
                    });

                updateFooter(name);
            }

            loadContentFromHash();
            window.addEventListener('hashchange', loadContentFromHash);
        </script>
    </body>
</html>
