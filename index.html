            // Globe Initializing
            function initGlobe() {
                const cityPoints = [
                    {
                        name: '武汉',
                        lat: 30.5928,
                        lng: 114.3055,
                        color: 'cyan',
                        size: 0.5
                    },
                    {
                        name: '哈尔滨',
                        lat: 45.8038,
                        lng: 126.5349,
                        color: 'cyan',
                        size: 0.5
                    }
                ];

                const container = document.getElementById('globeViz');
                if (!container) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(
                    45,
                    container.clientWidth / container.clientHeight,
                    0.1,
                    1000
                );
                camera.position.set(0, 0, 250);

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(renderer.domElement);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
                scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
                directionalLight.position.set(100, 100, 100);
                scene.add(directionalLight);

                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enablePan = false;
                controls.minDistance = 250;
                controls.maxDistance = 250;

                const GlobeConstructor = window['ThreeGlobe']; 
                const Globe = new GlobeConstructor()
                    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-water.png');

                // Globe.pointsData(cityPoints)
                //     .pointLat(d => d.lat).pointLng(d => d.lng).pointAltitude(d => 0.01)
                //     .pointRadius(d => d.size).pointColor(d => d.color).pointLabel(d => d.name)
                //     .pointLabelResolution(1024).pointLabelSize(1.5);

                Globe.rotation.y = - (104 * Math.PI / 180);
                scene.add(Globe);

                (function animate() {
                    requestAnimationFrame(animate);

                    // Globe.rotation.y += 0.0005;

                    controls.update();
                    renderer.render(scene, camera);
                })();

                window.addEventListener('resize', () => {
                    const w = container.clientWidth;
                    const h = container.clientHeight;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    renderer.setSize(w, h);
                });

                // const tooltip = document.getElementById('tooltip');
                // window.addEventListener('mousemove', ev => {
                //     const x = ev.clientX;
                //     const y = ev.clientY;
                //     const rect = renderer.domElement.getBoundingClientRect();
                //     const mouse = new THREE.Vector2(
                //     ((x - rect.left) / rect.width) * 2 - 1,
                //     - ((y - rect.top) / rect.height) * 2 + 1
                //     );

                //     const raycaster = new THREE.Raycaster();
                //     raycaster.setFromCamera(mouse, camera);

                //     const intersects = raycaster.intersectObjects(Globe.pointsMesh.children);
                //     if (intersects.length > 0) {
                //     const { object } = intersects[0];
                //     if (object && object.userData && object.userData.label) {
                //         tooltip.style.opacity = 1;
                //         tooltip.style.left = `${x + 10}px`;
                //         tooltip.style.top = `${y + 10}px`;
                //         tooltip.innerHTML = object.userData.label;
                //     }
                //     } else {
                //     tooltip.style.opacity = 0;
                //     }
                // });
            }

            // Footer Updating
            function updateFooter(pageName) {
                const footer = document.querySelector('footer');
                if (pageName === 'home') {
                    footer.textContent = "Yuxuan Zhang's Homepage";
                } else {
                    const displayName = pageName.charAt(0).toUpperCase() + pageName.slice(1);
                    footer.textContent = `Yuxuan Zhang's Homepage > ${displayName}`;
                }
            }

            // 根据 URL Hash 加载对应的 .html 内容
            function loadContentFromHash() {
                const defaultPage = 'home';
                const hash = window.location.hash.slice(1);
                const name = hash || defaultPage;

                fetch(`${name}.html`)
                    .then(r => r.text())
                    .then(html => {
                        document.getElementById('content').innerHTML = html;

                        // 只有当加载的是 About 板块时，才初始化地球
                        if (name === 'about') {
                            // 确保 DOM 完全插入后再初始化
                            setTimeout(initGlobe, 50);
                        }

                        // 如果存在 .grid 布局，则执行 Masonry
                        const $grid = $('.grid').imagesLoaded(function () {
                            $grid.masonry({
                                itemSelector: '.grid-item',
                                percentPosition: true,
                                columnWidth: '.grid-sizer',
                                gutter: 3,
                            });
                        });
                    })
                    .catch(() => {
                        document.getElementById('content').innerHTML = '<p>Content not found.</p>';
                    });

                updateFooter(name);
            }

            loadContentFromHash();
            window.addEventListener('hashchange', loadContentFromHash);
        </script>
