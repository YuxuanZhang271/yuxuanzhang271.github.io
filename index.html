<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <link rel="stylesheet" href="css/index.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-sA+4dk9gD2JpcpMx2DxN2JYc0u+QU3Y8r1G4/5ZP0XY=" crossorigin=""/>
        <title>Yuxuan Zhang's Homepage</title>

        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
        <script src="https://unpkg.com/imagesloaded@4/imagesloaded.pkgd.min.js"></script>
        <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-QVQFKDXGh7UJwA8nmsMBhSTkmM5luYXjeP4syKQYvBk=" crossorigin=""></script>
    </head>

    <body>
        <header>
            <ul>
                <li id="homepage"><a href="#home">Yuxuan Zhang's Homepage</a></li>
                <li><a href="#publications">Publications</a></li>
                <li><a href="#education">Education</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#cv">CV</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </header>

        <aside>
            <img src="images/profile_photo.png" alt="Profile Picture">
            <div style="margin-bottom: 40px;"></div>
            <h1>Yuxuan Zhang</h1>
            <div>Master Student @ NUS</div>
            <div>Singapore</div>
            <div>he/him</div>
            <div id="links">
                <a href="mailto:e1216649@u.nus.edu">Email</a>
                <a href="https://github.com/yuxuanzhang271">GitHub</a>
                <a href="https://linkedin.com/in/yuxuanzhang271">LinkedIn</a>
            </div>
        </aside>

        <main>
            <section id="content"></section>
        </main>

        <footer>
            Yuxuan Zhang's Homepage
        </footer>

        <script>
            // 更新 Footer 文本，不修改，只做示意
            function updateFooter(pageName) {
                const footer = document.querySelector('footer');
                if (pageName === 'home') {
                    footer.textContent = "Yuxuan Zhang's Homepage";
                } else {
                    const displayName = pageName.charAt(0).toUpperCase() + pageName.slice(1);
                    footer.textContent = `Yuxuan Zhang's Homepage > ${displayName}`;
                }
            }

            // 加载指定名称的 HTML（如 home.html、about.html……），并注入到 #content
            function loadContentFromHash() {
                const defaultPage = 'home';
                const hash = window.location.hash.slice(1);
                const name = hash || defaultPage;

                fetch(`${name}.html`)
                    .then(r => r.text())
                    .then(html => {
                        // 1. 把获取到的 HTML 塞到 #content
                        document.getElementById('content').innerHTML = html;

                        // 2. 进行 Masonry 布局（如果有 .grid 元素）
                        const $grid = $('.grid').imagesLoaded(function () {
                            $grid.masonry({
                                itemSelector: '.grid-item',
                                percentPosition: true,
                                columnWidth: '.grid-sizer',
                                gutter: 3,
                            });
                        });

                        // 3. 如果当前加载的是 about.html，就在这里初始化地图
                        if (name === 'about') {
                            // 注意：这里必须确保 <div id="map"></div> 已经在 about.html 里
                            initWuhanMap();
                        }
                    })
                    .catch(() => {
                        document.getElementById('content').innerHTML = '<p>Content not found.</p>';
                    });

                updateFooter(name);
            }

            // 单独封装一个函数，专门用来初始化 Leaflet 地图
            function initWuhanMap() {
                // 武汉市中心坐标 [纬度, 经度]
                const wuhanCenter = [30.5928, 114.3055];

                // 1. 创建地图实例并将视图定位到武汉
                const map = L.map("map").setView(wuhanCenter, 12);

                // 2. 添加 OpenStreetMap 瓦片图层
                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                    attribution:
                        '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                    maxZoom: 19,
                    tileSize: 256,
                    zoomOffset: 0
                }).addTo(map);

                // 3. 可选：在武汉中心点添加一个标记并弹出提示
                L.marker(wuhanCenter)
                    .addTo(map)
                    .bindPopup("这里是武汉市中心")
                    .openPopup();
            }

            // 首次页面加载时就调用一次，根据 Hash 判断要加载哪一页
            loadContentFromHash();

            // 监听 Hash 改变（比如点击导航到 #about、#home），重新加载对应内容
            window.addEventListener('hashchange', loadContentFromHash);
        </script>
    </body>
</html>
