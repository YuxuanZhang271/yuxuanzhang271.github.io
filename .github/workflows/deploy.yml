# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: ["ver-3"] # 当你推送到 ver-3 分支时触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and Build
        run: |
          # 这一步将 TSX 编译为静态网页
          # 如果你本地使用了 Vite 或 Webpack，请运行相应的 build 命令
          # 如果只是简单脚本，可以根据你的构建工具调整
          npm install
          npm run build 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # 编译后的静态文件所在目录

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4